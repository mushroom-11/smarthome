<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>智能家居综合控制</title>
    <script src="https://unpkg.com/mqtt@5.6.0/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', 'Segoe UI', 'PingFang SC', sans-serif;
            background: radial-gradient(ellipse at 20% 50%, #0a0f1e 0%, #03050b 70%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, -40px); }
        }
        .ambient-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 70%);
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status-bar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px currentColor;
        }
        .dot.online {
            background: #10b981;
            box-shadow: 0 0 15px #10b981;
        }
        .sensors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .sensor-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .sensor-item:hover { border-color: rgba(255,255,255,0.3); }
        .sensor-value {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1.2;
            color: #fff;
            margin-bottom: 6px;
        }
        .sensor-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .sensor-time {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .sensor-status {
            font-size: 0.75rem;
            color: #ef4444;
            margin-top: 4px;
            display: none;
        }
        .sensor-item:nth-child(1) { background: linear-gradient(145deg, rgba(14,165,233,0.2), rgba(255,255,255,0.05)); }
        .sensor-item:nth-child(2) { background: linear-gradient(145deg, rgba(16,185,129,0.2), rgba(255,255,255,0.05)); }
        .sensor-item:nth-child(3) { background: linear-gradient(145deg, rgba(139,92,246,0.2), rgba(255,255,255,0.05)); }
        .sensor-item:nth-child(4) { background: linear-gradient(145deg, rgba(245,158,11,0.2), rgba(255,255,255,0.05)); }

        .controls-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        .control-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ctrl-card {
            flex: 1;
            min-width: 140px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .ctrl-card:hover {
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }
        .ctrl-name {
            font-weight: 600;
            margin-bottom: 16px;
            color: #ccc;
        }
        .toggle {
            position: relative;
            display: inline-block;
            width: 64px;
            height: 32px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.15);
            transition: 0.3s;
            border-radius: 32px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: 0.3s;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        input:checked + .slider {
            background: #10b981;
            box-shadow: 0 0 15px #10b981;
        }
        input:checked + .slider:before {
            transform: translateX(32px);
            background-color: #fff;
        }
        .chart-wrapper {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            height: 280px;
        }
        .chart-wrapper h3 { color: #ccc; margin-bottom: 12px; }
        .log-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            color: #ccc;
        }
        .log-box {
            max-height: 160px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 12px;
            display: none;
        }
        .log-box.open { display: block; }
        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal {
            background: rgba(20,25,45,0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px;
            min-width: 300px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        .modal input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            color: #fff;
        }
        .btn-save {
            margin-top: 14px;
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .sensors-grid { grid-template-columns: 1fr 1fr; }
            .control-panel { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="ambient-glow"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>阈值报警设置</h3>
        <label>温度上限 <input type="number" id="tempMax" value="35"></label>
        <label>温度下限 <input type="number" id="tempMin" value="5"></label>
        <label>湿度上限 <input type="number" id="humiMax" value="80"></label>
        <label>湿度下限 <input type="number" id="humiMin" value="20"></label>
        <button class="btn-save" id="saveAlertBtn">保存设置</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>智能家居综合控制</h1>
    </div>

    <div class="status-bar">
        <span>bemfa.com:9504</span>
        <span><span class="dot" id="connDot"></span> <span id="connText">等待连接...</span></span>
    </div>

    <div class="sensors-grid">
        <div class="sensor-item" id="tempCard">
            <div class="sensor-label">温度</div>
            <div class="sensor-value"><span id="tempValue">--</span>°</div>
            <div class="sensor-time" id="tempTime"></div>
        </div>
        <div class="sensor-item" id="humiCard">
            <div class="sensor-label">湿度</div>
            <div class="sensor-value"><span id="humiValue">--</span>%</div>
            <div class="sensor-time" id="humiTime"></div>
        </div>
        <div class="sensor-item">
            <div class="sensor-label">土壤湿度</div>
            <div class="sensor-value" id="moistValue">--</div>
            <div class="sensor-time" id="moistTime"></div>
        </div>
        <div class="sensor-item" id="motionCard">
            <div class="sensor-label">人体感应</div>
            <div class="sensor-value" id="motionValue">--</div>
            <div class="sensor-time" id="motionTime"></div>
            <div class="sensor-status" id="motionLost">信号丢失</div>
        </div>
    </div>

    <div class="controls-section">
        <div class="section-title">设备控制</div>
        <div class="control-panel">
            <div class="ctrl-card">
                <div class="ctrl-name">LED 灯光</div>
                <label class="toggle">
                    <input type="checkbox" id="lightToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="ctrl-card">
                <div class="ctrl-name">继电器</div>
                <label class="toggle">
                    <input type="checkbox" id="fanToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="ctrl-card">
                <div class="ctrl-name">蜂鸣器</div>
                <label class="toggle">
                    <input type="checkbox" id="buzzerToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div class="chart-wrapper">
        <h3>实时温湿度曲线</h3>
        <canvas id="tempHumiChart" style="width:100%; height:210px;"></canvas>
    </div>

    <div class="log-section">
        <div class="log-header" id="logHeader">
            <span>系统日志</span>
            <span id="logToggleIcon">▶</span>
        </div>
        <div class="log-box" id="logBox">[系统] 正在初始化...</div>
    </div>
</div>

<script>
    const APP_ID = "beid_xcTN1EjN1czNx8FNwQTMzMD";
    const SECRET_KEY = "F9n2w28tg3f8o8A6qMUy3EXghIpC4SMh";
    const BROKER_URL = "wss://bemfa.com:9504/wss";

    const TOPICS = {
        DHT: "DHT004",
        MOIST: "turang004",
        MOTION: "PIR006",
        LIGHT: "LED002",
        FAN: "fan003",
        BUZZER: "fengming006"
    };

    let client = null;
    let states = { light: false, fan: false, buzzer: false };
    let lastTemp = null, lastHumi = null;
    let thresholds = { tempMax: 35, tempMin: 5, humiMax: 80, humiMin: 20 };
    let tempHumiChart = null;

    const $ = id => document.getElementById(id);
    const lightToggle = $('lightToggle');
    const fanToggle = $('fanToggle');
    const buzzerToggle = $('buzzerToggle');
    const logBox = $('logBox');
    const connDot = $('connDot');
    const connText = $('connText');
    const logToggleIcon = $('logToggleIcon');
    const motionValueEl = $('motionValue');
    const motionTimeEl = $('motionTime');
    const motionLostEl = $('motionLost');

    // 人体感应超时检测
    let lastMotionTimestamp = 0;
    const MOTION_TIMEOUT = 15000; // 15秒无更新认为信号丢失

    function formatTime() {
        return new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    function addLog(msg) {
        logBox.innerHTML = `[${formatTime()}] ${msg}\n` + logBox.innerHTML;
    }
    function setStatus(ok) {
        connDot.className = ok ? 'dot online' : 'dot offline';
        connText.innerText = ok ? '已连接' : '连接断开';
    }
    function updateTimeDisplay(el) {
        if (el) el.innerText = formatTime();
    }

    function publishDeviceState(type, state) {
        const topic = TOPICS[type.toUpperCase()];
        const cmd = state ? 'on' : 'off';
        if (client && client.connected) {
            client.publish(topic, cmd);
            addLog(`控制: ${type} -> ${cmd}`);
        } else {
            addLog('未连接, 无法发送指令');
        }
    }

    function checkAlerts() {
        const t = parseFloat(lastTemp);
        const h = parseFloat(lastHumi);
        if (isNaN(t) || isNaN(h)) return;
        const alertTemp = (t > thresholds.tempMax || t < thresholds.tempMin);
        const alertHumi = (h > thresholds.humiMax || h < thresholds.humiMin);
        $('tempCard').style.borderColor = alertTemp ? '#ef4444' : '';
        $('humiCard').style.borderColor = alertHumi ? '#ef4444' : '';
    }

    function openModal() {
        $('tempMax').value = thresholds.tempMax;
        $('tempMin').value = thresholds.tempMin;
        $('humiMax').value = thresholds.humiMax;
        $('humiMin').value = thresholds.humiMin;
        $('modalOverlay').style.display = 'flex';
    }

    function updateMotionDisplay(msg) {
        if (msg === '1') {
            motionValueEl.innerText = '有人';
        } else if (msg === '0') {
            motionValueEl.innerText = '无人';
        } else {
            motionValueEl.innerText = '--';
        }
        updateTimeDisplay(motionTimeEl);
        lastMotionTimestamp = Date.now();
        motionLostEl.style.display = 'none';
    }

    function checkMotionTimeout() {
        if (lastMotionTimestamp && (Date.now() - lastMotionTimestamp) > MOTION_TIMEOUT) {
            motionValueEl.innerText = '--';
            motionLostEl.style.display = 'block';
        }
    }
    setInterval(checkMotionTimeout, 2000);

    $('saveAlertBtn').addEventListener('click', () => {
        thresholds.tempMax = +$('tempMax').value || 35;
        thresholds.tempMin = +$('tempMin').value || 5;
        thresholds.humiMax = +$('humiMax').value || 80;
        thresholds.humiMin = +$('humiMin').value || 20;
        $('modalOverlay').style.display = 'none';
        checkAlerts();
        addLog('阈值已更新');
    });
    $('modalOverlay').addEventListener('click', (e) => {
        if (e.target === $('modalOverlay')) $('modalOverlay').style.display = 'none';
    });

    function initChart() {
        const ctx = $('tempHumiChart').getContext('2d');
        tempHumiChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: '温度 ℃', data: [], borderColor: '#0ea5e9', backgroundColor: 'rgba(14,165,233,0.2)', tension: 0.3, fill: true },
                { label: '湿度 %', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.2)', tension: 0.3, fill: true }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ccc' } } },
                scales: {
                    x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });
    }
    function updateChart(temp, humi) {
        if (!tempHumiChart) return;
        const now = formatTime().slice(0,5);
        const chart = tempHumiChart;
        if (chart.data.labels.length >= 15) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
            chart.data.datasets[1].data.shift();
        }
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(parseFloat(temp));
        chart.data.datasets[1].data.push(parseFloat(humi));
        chart.update();
    }

    function connectMQTT() {
        if (client) client.end();
        client = mqtt.connect(BROKER_URL, {
            clientId: 'web_'+Math.random().toString(16).slice(2,14),
            username: APP_ID,
            password: SECRET_KEY,
            keepalive: 60,
            reconnectPeriod: 3000
        });
        client.on('connect', () => {
            setStatus(true);
            addLog('已连接到巴法云');
            client.subscribe(Object.values(TOPICS));
        });
        client.on('message', (topic, payload) => {
            const msg = payload.toString().trim();
            addLog(`${topic}: ${msg}`);

            if (topic === TOPICS.DHT && msg.startsWith('#')) {
                const parts = msg.split('#').filter(Boolean);
                if (parts.length >= 2) {
                    lastTemp = parts[0]; lastHumi = parts[1];
                    $('tempValue').innerText = lastTemp;
                    $('humiValue').innerText = lastHumi;
                    updateTimeDisplay($('tempTime'));
                    updateTimeDisplay($('humiTime'));
                    updateChart(lastTemp, lastHumi);
                    checkAlerts();
                }
            } else if (topic === TOPICS.MOIST) {
                $('moistValue').innerText = msg;
                updateTimeDisplay($('moistTime'));
            } else if (topic === TOPICS.MOTION) {
                // 人体感应消息处理
                updateMotionDisplay(msg);
            } else if (topic === TOPICS.LIGHT) {
                const isOn = (msg === '1' || msg.toLowerCase() === 'on');
                states.light = isOn;
                lightToggle.checked = isOn;
            } else if (topic === TOPICS.FAN) {
                const isOn = (msg === '1' || msg.toLowerCase() === 'on');
                states.fan = isOn;
                fanToggle.checked = isOn;
            } else if (topic === TOPICS.BUZZER) {
                const isOn = (msg === '1' || msg.toLowerCase() === 'on');
                states.buzzer = isOn;
                buzzerToggle.checked = isOn;
            }
        });
        client.on('close', () => setStatus(false));
        client.on('error', (e) => addLog('错误: '+e.message));
    }

    function bindEvents() {
        lightToggle.addEventListener('change', () => {
            states.light = lightToggle.checked;
            publishDeviceState('light', states.light);
        });
        fanToggle.addEventListener('change', () => {
            states.fan = fanToggle.checked;
            publishDeviceState('fan', states.fan);
        });
        buzzerToggle.addEventListener('change', () => {
            states.buzzer = buzzerToggle.checked;
            publishDeviceState('buzzer', states.buzzer);
        });

        $('tempCard').addEventListener('click', openModal);
        $('humiCard').addEventListener('click', openModal);

        $('logHeader').addEventListener('click', () => {
            logBox.classList.toggle('open');
            logToggleIcon.innerText = logBox.classList.contains('open') ? '▼' : '▶';
        });
    }

    window.onload = () => {
        initChart();
        bindEvents();
        connectMQTT();
    };
</script>
</body>
</html>
